{% extends "base.html" %}
{% block content %}
<h2>Team Login</h2>
<form class="form" method="post">
  <label>Team Name
    <input type="text" name="team_name" required />
  </label>
  <label>Password
    <input type="password" name="password" required />
  </label>
  <button class="btn" type="submit">Login</button>
</form>
{% endblock %}
